<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bloom">
  <meta name="theme-color" content="#ff6ca2">

  <title>Bloom - Set New Password</title>

  <link rel="stylesheet" href="css/auth.css?v=2">
</head>

<body>

  <div class="container">

    <h1 class="logo">Bloom</h1>

    <div class="form-box">

      <h2>Set new password</h2>

      <p class="info-text">
        Choose a new password for your account.
      </p>

      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" autocomplete="new-password" placeholder="At least 6 characters">

      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="Repeat password">

      <button type="button" id="savePasswordBtn" disabled>Save new password</button>

      <p id="updateMsg" class="form-msg hidden"></p>

      <p class="switch">
        <a href="reset-password.html">Request a new reset link</a>
        ·
        <a href="index.html">Log in</a>
      </p>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js?v=2"></script>
  <script type="module" src="js/update-password.js?v=2"></script>

</body>
</html>
