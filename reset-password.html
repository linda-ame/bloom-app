<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Bloom - Reset Password</title>

  <link rel="stylesheet" href="css/auth.css?v=1">
</head>

<body>

  <div class="container">

    <h1 class="logo">Bloom</h1>

    <div class="form-box">

      <h2>Reset password</h2>

      <p class="info-text">
        Enter your email and we’ll send you a password reset link.
      </p>

      <!-- Email -->
      <input type="email" id="email" placeholder="Email">

      <!-- Reset button -->
      <button id="resetBtn">Send reset link</button>

      <p id="resetMsg" class="form-msg hidden"></p>

      <!-- Back to login -->
      <p class="switch">
        Remember your password?
        <a href="index.html">Log in</a>
      </p>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js?v=1"></script>
  <script type="module" src="js/reset-password.js?v=1"></script>

</body>
</html>
